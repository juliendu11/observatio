services:
  mariadb:
    container_name: observatio-mariadb-prod
    image: 'mariadb:11.8.3'
    restart: unless-stopped
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    container_name: observatio-redis-prod
    image: 'redis:6.2-alpine'
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: observatio-web-prod
    image: observatio:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      APP_TYPE: web
      DB_HOST: mariadb
      REDIS_HOST: redis
    ports:
      - "${PORT:-3333}:3333"
    volumes:
      - storage_data:/app/storage
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "3333" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  recorder:
    container_name: observatio-recorder-prod
    image: observatio:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      APP_TYPE: recorder
      DB_HOST: mariadb
      REDIS_HOST: redis
    volumes:
      - storage_data:/app/storage
    depends_on:
      web:
        condition: service_healthy

  queue:
    container_name: observatio-queue-prod
    image: observatio:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      APP_TYPE: job
      DB_HOST: mariadb
      REDIS_HOST: redis
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage

volumes:
  mariadb_data:
  redis_data:
  storage_data:
